<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KillPollo NFTs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .nft-container {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
        }

        .hero-section {
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.2;
            filter: blur(50px);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .big-btn {
            font-size: 1.5em;
            padding: 15px 40px;
            background: linear-gradient(135deg, #9945FF 0%, #14F195 100%);
            /* Solana Gradient */
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(153, 69, 255, 0.5);
            transition: all 0.3s;
        }

        .big-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(20, 241, 149, 0.5);
        }
    </style>
</head>

<body>
    <div class="app-background"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo" onclick="window.location.href='game.html'" style="cursor: pointer;">
                <span class="icon">🐔</span>
                <h1>CyberPollo <span class="highlight">10K</span></h1>
            </div>
            <div class="user-stats">
                <button class="nav-btn" id="lang-toggle" onclick="toggleLanguage()"
                    style="width: auto; padding: 5px 15px; border-radius: 20px; margin-right: 10px; background: rgba(255,255,255,0.1);">
                    🇺🇸 EN
                </button>
                <button class="nav-btn" data-i18n="home" onclick="window.location.href='game.html'"
                    style="width: auto; padding: 5px 15px; border-radius: 20px; margin-right: 10px; background: rgba(0,0,0,0.3);">
                    🏠 Inicio
                </button>
                <button class="nav-btn" onclick="window.location.href='profile.html'"
                    style="width: auto; padding: 5px 15px; border-radius: 20px; margin-right: 10px; background: rgba(255, 100, 200, 0.2); border: 1px solid rgba(255, 100, 200, 0.4);">
                    👤 Perfil
                </button>
            </div>
        </header>

        <main class="main-layout">
            <section class="nft-container glass-panel">

                <div class="hero-section">
                    <div class="hero-glow"></div>
                    <div class="hero-content">
                        <h1 class="glitch-text" data-i18n="nftTitle" style="font-size: 3em; margin-bottom: 10px;">
                            Colección KillPollo NFT</h1>
                        <h2 data-i18n="solanaMint" style="color: #14F195;">Acuñados en Solana</h2>
                        <p data-i18n="nftDesc"
                            style="max-width: 600px; margin: 20px auto; color: #ddd; line-height: 1.6;">
                            Cada KillPollo es único.
                        </p>

                        <button class="action-btn big-btn" data-i18n="buyNow"
                            onclick="window.open('https://www.vvv.so/killpollo', '_blank')">
                            COMPRAR EN VVV.SO
                        </button>
                    </div>
                </div>

                <h3 data-i18n="benefits" style="margin-top: 40px;">Beneficios de Holder</h3>

                <!-- NEON CAROUSEL -->
                <div class="neon-carousel-wrapper">
                    <div class="carousel-track" id="carousel-track">
                        <!-- JS Injected items -->
                    </div>
                    <div class="carousel-overlay"></div>
                </div>

                <style>
                    .neon-carousel-wrapper {
                        margin-top: 40px;
                        margin-bottom: 40px;
                        overflow: hidden;
                        position: relative;
                        padding: 20px 0;
                        background: rgba(0, 0, 0, 0.3);
                        border-top: 2px solid #ff00ff;
                        border-bottom: 2px solid #00ffff;
                        box-shadow: 0 0 15px #ff00ff, 0 0 15px #00ffff;
                    }

                    .carousel-track {
                        display: flex;
                        width: calc(200px * 20);
                        /* Estimate width */
                        animation: scroll 40s linear infinite;
                    }

                    .carousel-track:hover {
                        animation-play-state: paused;
                    }

                    .carousel-item {
                        width: 180px;
                        height: 180px;
                        margin: 0 15px;
                        border-radius: 10px;
                        border: 2px solid #fff;
                        box-shadow: 0 0 10px #ff00ff;
                        transition: transform 0.3s;
                        flex-shrink: 0;
                    }

                    .carousel-item:hover {
                        transform: scale(1.1) rotate(2deg);
                        box-shadow: 0 0 20px #00ffff;
                        z-index: 10;
                    }

                    @keyframes scroll {
                        0% {
                            transform: translateX(0);
                        }

                        100% {
                            transform: translateX(calc(-200px * 10));
                        }

                        /* Scroll half */
                    }

                    /* Scanline overlay */
                    .carousel-overlay {
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
                        background-size: 100% 2px, 3px 100%;
                        pointer-events: none;
                        z-index: 5;
                    }
                </style>
                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        const track = document.getElementById('carousel-track');
                        // We will duplicate the list to create seamless loop
                        // Images range: 100.jpeg to 115.jpeg
                        const startId = 100;
                        const count = 15;

                        let imagesHTML = '';
                        for (let i = 0; i < count; i++) {
                            const id = startId + i;
                            imagesHTML += `<img src="assets/images/${id}.jpeg" class="carousel-item" alt="KillPollo #${id}">`;
                        }

                        // Double it for smooth infinite scroll
                        track.innerHTML = imagesHTML + imagesHTML;
                    });
                </script>

                <div class="nft-grid">
                    <div class="feature-card">
                        <div style="font-size: 3em;">🏆</div>
                        <p data-i18n="benefit1">Torneos Exclusivos</p>
                    </div>
                    <div class="feature-card">
                        <div style="font-size: 3em;">💸</div>
                        <p data-i18n="benefit2">Multiplicador x1.5</p>
                    </div>
                    <div class="feature-card">
                        <div style="font-size: 3em;">🪂</div>
                        <p data-i18n="benefit3">Airdrops</p>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="wallet_adapter.js"></script>
    <script src="auth_supabase.js"></script>
    <script src="lang.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('cyberpollo_lang') || 'es';
            setLanguage(saved);
        });

        function toggleLanguage() {
            const current = localStorage.getItem('cyberpollo_lang') || 'es';
            const newLang = current === 'es' ? 'en' : 'es';
            setLanguage(newLang);
        }
    </script>
</body>

</html>
