<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KillPollo Incubator | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --accent: #14F195;
            --purple: #9945FF;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .incubator-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bonus-banner {
            background: linear-gradient(90deg, var(--purple), var(--accent));
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: black;
            margin-bottom: 40px;
            display: inline-block;
        }

        /* NFT Grid */
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .nft-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .nft-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(20, 241, 149, 0.1);
        }

        .nft-image-container {
            width: 100%;
            aspect-ratio: 1;
            background: #111;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nft-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nft-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .nft-name {
            font-weight: 900;
            font-size: 1.2rem;
            margin: 0;
        }

        .nft-id {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nft-price {
            text-align: right;
        }

        .price-val {
            font-weight: 900;
            color: var(--accent);
            font-size: 1.1rem;
            display: block;
        }

        .price-lab {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        .mint-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mint-btn:hover {
            background: var(--accent);
        }

        .perk-badge {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        /* Sidebar stats */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 16px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-weight: 900;
            font-size: 1.5rem;
            display: block;
        }

    </style>
</head>

<body>
    <div class="incubator-bg"></div>

    <div class="container">
        <header>
            <div class="logo">
                <span>🐔</span> KILLPOLLO INCUBATOR
            </div>
            <button id="connect-btn" class="mint-btn" style="width: auto; margin-top: 0; padding: 10px 20px;">
                CONECTAR CARTERA
            </button>
        </header>

        <div class="bonus-banner">
            ⚡️ PERK ACTIVO: +0.5% DE BONO EN VICTORIAS POR CADA KILLPOLLO POSEÍDO
        </div>

        <div class="stats-bar">
            <div class="stat-box">
                <span class="stat-label">Tus KillPollos</span>
                <span class="stat-value" id="user-nft-count">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Bono Total</span>
                <span class="stat-value" id="user-bonus-pct" style="color: var(--accent);">0.0%</span>
            </div>
        </div>

        <div class="nft-grid" id="incubator-grid">
            <!-- NFTs will be injected here -->
        </div>

        <div style="text-align: center; margin-top: 60px; padding-bottom: 40px;">
            <button onclick="window.location.href='game.html'" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); padding: 12px 30px; border-radius: 100px; cursor: pointer; font-size: 0.8rem;">
                ← VOLVER A LA ARENA
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="wallet_adapter.js"></script>
    <script src="auth_supabase.js"></script>

    <script>
        const IMAGE_BASE = "https://raw.githubusercontent.com/miladyxx333-lab/fightclub/main/assets/images/";
        
        async function init() {
            renderPollos();
            
            document.getElementById('connect-btn').onclick = async () => {
                try {
                    const addr = await wallet.connect();
                    if (addr) updateWalletStats();
                } catch (e) {
                    alert(e.message);
                }
            };

            // Check if already connected
            setTimeout(() => {
                if (wallet.publicKey) updateWalletStats();
            }, 500);
        }

        function renderPollos() {
            const grid = document.getElementById('incubator-grid');
            grid.innerHTML = '';
            
            // Render 12 sample pollos
            for(let i=0; i<12; i++) {
                const id = Math.floor(Math.random() * 9999);
                const price = "0.091";
                
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <div class="perk-badge">+0.5% REWARD</div>
                    <div class="nft-image-container">
                        <img src="${IMAGE_BASE}${id}.jpeg" onerror="this.src='https://via.placeholder.com/400x400/111/333?text=KILLPOLLO+#'+${id}" alt="KillPollo">
                    </div>
                    <div class="nft-info">
                        <div>
                            <span class="nft-id">KILLPOLLO SERIES</span>
                            <h4 class="nft-name">#${id}</h4>
                        </div>
                        <div class="nft-price">
                            <span class="price-lab">INCUBAR</span>
                            <span class="price-val">${price} SOL</span>
                        </div>
                    </div>
                    <button class="mint-btn" onclick="buyPollo(${id})">MINT NOW</button>
                `;
                grid.appendChild(card);
            }
        }

        async function updateWalletStats() {
            const addr = wallet.publicKey;
            if(!addr) return;

            document.getElementById('connect-btn').textContent = `WALLET: ${addr.slice(0,4)}...${addr.slice(-4)}`;
            
            // Fetch real count from user_inventory
            const { data, error } = await supabase
                .from('user_inventory')
                .select('pollo_id')
                .eq('wallet_address', addr);
            
            const count = data ? data.length : 0;
            const bonus = (count * 0.5).toFixed(1);
            
            document.getElementById('user-nft-count').textContent = count;
            document.getElementById('user-bonus-pct').textContent = `+${bonus}%`;
            
            // Store for arena_combat.js
            localStorage.setItem('cp_nft_count', count);
        }

        async function buyPollo(id) {
            window.open('https://www.vvv.so/killpollo', '_blank');
        }

        init();
    </script>
</body>

</html>
