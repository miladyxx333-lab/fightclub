<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPollo Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="store_marble.css">
</head>

<body>
    <!-- Overlay PRINCIPAL (Reemplaza la tienda anterior) -->
    <div id="shopOverlay" class="betting-overlay">
        <div class="betting-modal">
            <!-- Header con back button -->
            <a href="game.html" class="back-btn" title="Volver">←</a>

            <h3 class="betting-title">🛒 TIENDA DE CRÉDITOS</h3>

            <!-- User Balance Display -->
            <div style="margin-bottom: 20px; font-size: 0.9rem; color: #ccc;">
                Saldo: <span id="current-balance" style="color: #14F195; font-weight: bold;">0</span>
            </div>

            <!-- Daily Gift -->
            <div class="daily-gift-section">
                <div class="gift-info">
                    <strong>🎁 REGALO DIARIO</strong>
                    <span><span id="bonus-amount-display">100</span> créditos gratis</span>
                </div>
                <div style="text-align: right;">
                    <div id="countdown-timer" style="font-size: 0.7rem; margin-bottom: 5px; color:#aaa;"></div>
                    <button id="btn-starter" class="btn-claim" onclick="claimDailyBonus()">RECLAMAR</button>
                </div>
            </div>

            <!-- Solana Pay Section -->
            <div class="solana-pay-card">
                <div class="solana-header">
                    <!-- Icono Sol -->
                    <svg width="20" height="20" viewBox="0 0 397 311" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style="margin-right:8px">
                        <path
                            d="M64.6 237.9c2.4-2.4 5.7-3.8 9.2-3.8h317.4c5.8 0 10.5 4.7 10.5 10.5 0 2.8-1.1 5.5-3.1 7.5L332.1 308c-2.4 2.4-5.7 3.8-9.2 3.8H5.5c-5.8 0-10.5-4.7-10.5-10.5 0-2.8 1.1-5.5 3.1-7.5L64.6 237.9zM332.1 73c-2.4 2.4-5.7 3.8-9.2 3.8H5.5c-5.8 0-10.5-4.7-10.5-10.5 0-2.8 1.1-5.5 3.1-7.5L64.6 3.1c2.4-2.4 5.7-3.8 9.2-3.8h317.4c5.8 0 10.5 4.7 10.5 10.5 0 2.8-1.1 5.5-3.1 7.5L332.1 73zM64.6 155.4c2.4-2.4 5.7-3.8 9.2-3.8h317.4c5.8 0 10.5 4.7 10.5 10.5 0 2.8-1.1 5.5-3.1 7.5L332.1 225.5c-2.4 2.4-5.7 3.8-9.2 3.8H5.5c-5.8 0-10.5-4.7-10.5-10.5 0-2.8 1.1-5.5 3.1-7.5L64.6 155.4z"
                            fill="url(#paint0_linear)" />
                        <defs>
                            <linearGradient id="paint0_linear" x1="5.5" y1="155.4" x2="391.7" y2="155.4"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#9945FF" />
                                <stop offset="1" stop-color="#14F195" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span>SOLANA PAY</span>
                </div>

                <div class="input-wrapper">
                    <input type="number" id="shopAmountUSD" value="10" min="1" step="1" oninput="updatePreview()">
                    <span class="currency-tag">USD</span>
                </div>

                <div id="creditsPreview">10,000 💎</div>

                <button id="generateQRBtn" class="action-btn-store" onclick="generatePaymentQR()">
                    💳 GENERAR CÓDIGO QR
                </button>

                <!-- QR Area (Hidden by default) -->
                <div id="qrCodeArea" style="display:none;">
                    <div id="qrCodeContainer">
                        <img id="qr-image-display" src="" alt="QR Code">
                    </div>
                    <div id="qrInfoText">Scan with your Wallet</div>
                    <div id="payment-loading" class="hidden"
                        style="margin-top:10px; color:#14F195; font-size:0.8rem; font-weight:bold;">
                        ⏳ Verificando pago...
                    </div>
                    <button class="nav-btn" style="margin-top:10px; font-size:0.8rem; background:#333;"
                        onclick="resetStoreUI()">Cancelar</button>
                    <!-- Deep Link Button for Mobile -->
                    <button id="btn-open-wallet" class="action-btn-store"
                        style="margin-top:10px; font-size:0.8rem; background: #333; border: 1px solid #555; display:none;">
                        Abrir Wallet App ↗
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth_supabase.js"></script>
    <script src="lang.js"></script>

    <script>
        // --- Config ---
        const API_URL = "/api";
        const MERCHANT_WALLET = "e6uU5apmNZrUX4L2fCZ7hupZMwofS3JUNXEHcSxqcBD";
        const BONUS_AMOUNT = 100;
        const COOLDOWN_MS = 24 * 60 * 60 * 1000;
        const CREDITS_PER_USD = 1000; // $1 = 1000 credits

        let user = null;
        let pollInterval = null;

        // --- Init ---
        (async () => {
            // Check auth
            await auth.requireAuth();
            user = auth.getCurrentUser();
            if (user) document.getElementById('current-balance').textContent = user.credits.toLocaleString();
            
            // Start Timer UI
            updateTimerDisplay();
            setInterval(updateTimerDisplay, 1000);
            
            // Init Preview
            updatePreview();
        })();

        // --- UI Logic ---
        function updatePreview() {
            const usd = parseFloat(document.getElementById('shopAmountUSD').value) || 0;
            const credits = Math.floor(usd * CREDITS_PER_USD); 
            document.getElementById('creditsPreview').textContent = `${credits.toLocaleString()} 💎`;
        }

        function resetStoreUI() {
            document.getElementById('qrCodeArea').style.display = 'none';
            document.getElementById('generateQRBtn').style.display = 'block';
            document.getElementById('generateQRBtn').disabled = false;
            document.getElementById('generateQRBtn').textContent = "💳 GENERAR CÓDIGO QR";
            if (pollInterval) clearInterval(pollInterval);
        }

        // --- Payment Logic (MarbleBet Style) ---
        async function generatePaymentQR() {
            const usd = parseFloat(document.getElementById('shopAmountUSD').value) || 0;
            if(usd < 1) return alert("Mínimo $1 USD");
            
            const credits = Math.floor(usd * CREDITS_PER_USD);
            const btn = document.getElementById('generateQRBtn');
            
            btn.disabled = true;
            btn.textContent = "Generando...";

            try {
                // 1. Call Backend
                const response = await fetch(`${API_URL}/create-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usd: usd,
                        label: "CyberPollo Store",
                        message: `Credits: ${credits}`
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || "Server Error " + response.status);
                }

                const data = await response.json();
                const order = data.order;

                // 2. Show QR
                const qrArea = document.getElementById('qrCodeArea');
                const qrImg = document.getElementById('qr-image-display');
                const infoText = document.getElementById('qrInfoText');
                const loading = document.getElementById('payment-loading');
                const openWalletBtn = document.getElementById('btn-open-wallet');

                qrImg.src = order.qrDataUrl;
                infoText.textContent = `${order.amountSOL} SOL ≈ $${usd} USD`;
                
                btn.style.display = 'none'; // Hide generate button
                qrArea.style.display = 'block'; // Show QR area
                loading.classList.remove('hidden');

                // Setup Deep Link button
                openWalletBtn.style.display = 'block';
                openWalletBtn.onclick = () => window.location.href = order.link;

                // 3. Start Polling
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(() => checkStatus(order.orderId, credits), 3000);

            } catch(e) {
                console.error(e);
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.textContent = "💳 GENERAR CÓDIGO QR";
            }
        }

        async function checkStatus(orderId, creditsToAdd) {
            try {
                const res = await fetch(`${API_URL}/check-payment?orderId=${orderId}`);
                const data = await res.json();

                if (data.status === 'paid' || (data.order && data.order.status === 'paid')) {
                    // Success!
                    clearInterval(pollInterval);
                    
                    document.getElementById('payment-loading').textContent = "✅ ¡PAGO EXITOSO!";
                    document.getElementById('payment-loading').style.color = "#14F195";

                    await auth.addCredits(creditsToAdd);
                    const newBalance = auth.getCurrentUser().credits;
                    document.getElementById('current-balance').textContent = newBalance.toLocaleString();

                    setTimeout(() => {
                        alert(`¡Has recibido ${creditsToAdd} créditos!`);
                        resetStoreUI();
                    }, 500);
                }
            } catch (e) {
                // Ignore polling errors
            }
        }

        // --- Daily Bonus ---
        function updateTimerDisplay() {
            if(!user) return;
            const lastClaim = localStorage.getItem(`cp_last_claim_${user.username}`);
            const btn = document.getElementById('btn-starter');
            const timerEl = document.getElementById('countdown-timer');

            if (!lastClaim) {
                timerEl.textContent = "¡Listo para reclamar!";
                timerEl.style.color = '#14F195';
                btn.disabled = false;
                return;
            }

            const now = Date.now();
            const elapsed = now - parseInt(lastClaim);

            if (elapsed >= COOLDOWN_MS) {
                timerEl.textContent = "¡Listo para reclamar!";
                timerEl.style.color = '#14F195';
                btn.disabled = false;
            } else {
                const remaining = COOLDOWN_MS - elapsed;
                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                timerEl.textContent = `Próximo: ${hours}h ${minutes}m`;
                timerEl.style.color = '#aaa';
                btn.disabled = true;
            }
        }

        function claimDailyBonus() {
            buyCredits(BONUS_AMOUNT, document.getElementById('btn-starter'), true);
            localStorage.setItem(`cp_last_claim_${user.username}`, Date.now().toString());
            updateTimerDisplay();
        }

        async function buyCredits(amount, btnElement, isBonus) {
            if(btnElement) {
                btnElement.disabled = true; 
                btnElement.textContent = "...";
            }
            await auth.addCredits(amount);
            document.getElementById('current-balance').textContent = auth.getCurrentUser().credits.toLocaleString();
            if(btnElement) {
                btnElement.textContent = "✅";
                setTimeout(() => {
                    btnElement.textContent = isBonus ? "RECLAMADO" : "COMPRAR";
                   if(isBonus) updateTimerDisplay();
                }, 1000);
            }
        }
    </script>
</body>

</html>
